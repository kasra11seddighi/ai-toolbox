<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابزار هوش مصنوعی | کسری</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
</head>
<body>

<header class="glass">
    <h1 class="title">✨ جعبه ابزار جادویی</h1>
    <button id="theme-toggle" class="icon-btn">☀️</button>
</header>

<main>
    <div class="card">
        <div id="converter" class="tab active">
            <h2>🔄 ابزار</h2>
            <div class="headerBox">
                <div class="options-group">
                    <label for="convert-type">نوع عملیات:</label>
                    <select id="convert-type" class="glass-select">
                        <option value="speech_to_text">▶️ ویس به متن</option>
                        <option value="text_to_voice">🔊 متن به ویس</option>
                        <option value="translate_en">🌍 ترجمه</option>
                        <option value="summarize">📝 خلاصه‌سازی متن</option>
                    </select>
                </div>
                <div class="language-settings" id="language-settings" style="display:none;">
                    <label for="target-lang">زبان مقصد:</label>
                    <select id="target-lang" class="glass-select">
                        <option value="English">English</option>
                        <option value="German">German</option>
                        <option value="French">French</option>
                        <option value="Persian">Persian (فارسی)</option>
                    </select>
                </div>
                <div class="voice-settings" id="voice-settings" style="display:none;">
                    <label for="voice-select">انتخاب صدا:</label>
                    <select id="voice-select" class="glass-select">
                        <option value="alloy">Alloy</option>
                        <option value="fable">Fable</option>
                        <option value="nova">Nova</option>
                    </select>
                </div>
            </div>
            <textarea id="input-text" class="glass-input" placeholder="متن خودت رو اینجا وارد کن..."></textarea>
            <div id="audio-controls" class="audio-controls-container">
                <button id="record-btn" class="telegram-mic-btn">🎙️</button>
                <label for="audio-upload" class="upload-btn">📎 بارگذاری<input type="file" id="audio-upload" style="display:none;"></label>
                <span id="status-text">آماده دریافت صدای شما...</span>
            </div>
            <button id="convert-btn" class="action-btn">شروع عملیات ⚡</button>
            <div id="result-box" class="result-box" style="display:none;">
                <div id="result-text"></div>
            </div>
        </div>
    </div>
</main>
<script src="script.js"></script>
</body>
</html>
